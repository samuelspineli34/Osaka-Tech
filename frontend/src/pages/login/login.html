<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Osaka Tech</title>
    <meta name="title" content="Osaka Tech | Internal Support Portal">
    <meta name="description" content="Sistema corporativo de gerenciamento de chamados técnicos com arquitetura modular e segurança avançada.">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://osakatech.vercel.app/">
    <meta property="og:title" content="Osaka Tech | Service Desk">
    <meta property="og:description" content="Gerenciamento eficiente de tickets internos com controle de acesso RBAC.">
    <meta property="og:image" content="https://osakatech.vercel.app/agent.png">

    <script type="module" src="/src/pages/login/login.ts"></script>
    <script type="module" src="/src/style/global.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent !important;
            overflow: hidden; /* Trava o scroll global */
        }
        /* Ajuste para telas muito pequenas (ex: celulares antigos) para permitir scroll apenas neles */
        @media (max-height: 700px) {
            body { overflow-y: auto; }
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-4 antialiased">

    <!-- Loader -->
    <div id="global-loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-[#fdfaf3]/90 backdrop-blur-sm">
        <div class="h-10 w-10 rounded-full border-4 border-orange-200 border-t-[#d97706] animate-spin"></div>
    </div>

    <div class="w-full max-w-[420px] animate-in">
        <!-- Logo Area - Reduzido mb-10 para mb-6 -->
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-[1.8rem] shadow-xl mb-4 ring-4 ring-orange-200/50">
                <img src="/agent.png" alt="Agent" class="w-12 h-12">
            </div>
            <h1 class="text-3xl font-[900] text-[#2d1a0f] tracking-tighter">Osaka Tech</h1>
            <p class="text-[#d97706] font-black uppercase text-[10px] tracking-[0.4em]">Support Portal</p>
        </div>

        <!-- Login Card - Reduzido p-12 para p-8 -->
        <div class="bg-white rounded-[3rem] shadow-[0_20px_50px_-12px_rgba(69,26,3,0.15)] p-8 border-2 border-orange-100">
            <div class="mb-6 text-center">
                <h2 class="text-xl font-black text-[#2d1a0f] tracking-tight">Welcome Back</h2>
                <p class="text-slate-500 text-xs mt-1 font-medium">Verify your identity to access</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-[0.1em] text-[#451a03] ml-1">Corporate Email</label>
                    <div class="relative group">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 group-focus-within:text-[#d97706] transition-colors text-xl">email</span>
                        <input type="email" id="email" placeholder="name@osakacorp.com" autocomplete="email" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white border-2 border-orange-100 rounded-2xl outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-[#d97706] transition-all text-[#2d1a0f] font-bold text-sm placeholder:text-slate-300">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-[0.1em] text-[#451a03] ml-1">Security Key</label>
                    <div class="relative group">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 group-focus-within:text-[#d97706] transition-colors text-xl">lock</span>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white border-2 border-orange-100 rounded-2xl outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-[#d97706] transition-all text-[#2d1a0f] font-bold text-sm placeholder:text-slate-300">
                    </div>
                </div>

                <div class="flex items-center px-1">
                    <input type="checkbox" id="remember" class="w-3.5 h-3.5 text-[#d97706] border-orange-300 rounded focus:ring-[#d97706] cursor-pointer">
                    <label for="remember" class="ml-2 text-[11px] font-bold text-slate-600 cursor-pointer select-none">Keep session active</label>
                </div>

                <button type="submit"
                    class="w-full bg-[#1e130c] hover:bg-black text-white font-black py-4 rounded-2xl shadow-xl shadow-orange-900/10 transition-all active:scale-[0.98] uppercase text-[11px] tracking-[0.2em]">
                    Sign in to System
                </button>
            </form>

            <!-- Quick Access Section - Reduzido mt-10 para mt-6 -->
            <div class="mt-6 pt-6 border-t-2 border-orange-50">
                <p class="text-[9px] font-black uppercase tracking-[0.2em] text-orange-400 text-center mb-4">Demo Access Points</p>
                <div class="grid grid-cols-3 gap-2">
                    <button type="button" onclick="fillLogin('admin@osakacorp.com')"
                        class="py-2.5 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-xl text-[10px] font-black transition-all uppercase">Admin</button>
                    <button type="button" onclick="fillLogin('tech@osakacorp.com')"
                        class="py-2.5 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-xl text-[10px] font-black transition-all uppercase">Tech</button>
                    <button type="button" onclick="fillLogin('user@osakacorp.com')"
                        class="py-2.5 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-xl text-[10px] font-black transition-all uppercase">User</button>
                </div>
            </div>
        </div>

        <!-- Footer - Reduzido mt-12 para mt-6 -->
        <p class="text-center text-[#451a03] text-[9px] font-bold uppercase tracking-[0.3em] mt-6 opacity-40">
            &copy; 2026 OsakaCorp Infrastructure <br> Authorized Personnel Only
        </p>
    </div>

    <script>
        function fillLogin(email) {
            const e = document.getElementById('email');
            const p = document.getElementById('password');
            e.value = email; p.value = 'teste123';
            e.classList.add('border-[#d97706]');
            setTimeout(() => e.classList.remove('border-[#d97706]'), 600);
        }
    </script>
</body>
</html>
